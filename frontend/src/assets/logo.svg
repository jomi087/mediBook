<svg width="118" height="38" viewBox="0 0 118 38" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Blue gradient for M -->
    <linearGradient id="mGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Orange gradient for B -->
    <linearGradient id="bGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- MB Monogram -->
  <g transform="translate(4,4) scale(0.7)">   
    <!-- M -->
    <path
      d="M0 34V0L18 18L36 0V34"
      stroke="url(#mGradient)"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"/>

    <!-- B -->
    <path
        d="M39 0v34H54C62 34 66 29 66 22C66 16 62 12 57 11C62 10 65 6 65 1C65 -5 61 -9 53 -9H39"
        transform="translate(0 9)"
        stroke="url(#bGradient)"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
  </g>

  <!-- Medibook text -->
  <text x="56" y="22"
        font-family="Inter, Arial, sans-serif"
        font-size="17"
        font-weight="550"
        fill="#4d73c6">
    Medi
  </text>

  <text x="75" y="36"
        font-family="Inter, Arial, sans-serif"
        font-size="17"
        font-weight="550"
        fill="url(#bGradient)">
    book
  </text>
</svg>